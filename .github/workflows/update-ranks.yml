name: Update Player Ranks

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

jobs:
  update-ranks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch ranks & update files
        env:
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
        run: python scripts/update_ranks.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ranks.json roster.html
          git diff --staged --quiet || git commit -m "chore: update player ranks [skip ci]"
          git push origin main
          git pull --rebase origin main
